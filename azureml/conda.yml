name: mcucoder
channels:
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - pip:
      - torch
      - torchvision
      - torchaudio
      - torchmetrics
      - compressai
      - pillow
      - opencv-python
      - numpy
      - tqdm
      - matplotlib
      - datasets
      - huggingface_hub
      # MLflow + Azure ML MLflow plugin enable metric/artifact logging
      # to the workspace tracking server from inside the job container.
      - mlflow
      - azureml-mlflow
